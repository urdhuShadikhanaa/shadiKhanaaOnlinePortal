<template>
    <c-pq-datatable
        icon-name="standard:opportunity"
        key-field="id"
        title={title}
        custom-relative-max-height={customRelativeMaxHeight}
        use-relative-max-height={useRelativeMaxHeight}
        sortable-fields={sortableFields}
        sorted-by={sortedBy}
        sorted-direction={sortedDirection}
        filter={filterObj}
        show-spinner={showSpinner}
        show-record-count
        show-refresh-button
        show-row-number-column
        show-column-totals
        onrefresh={handleRefresh}
        loaded={loaded}
        onrowaction={handleRowAction}
    >
    
        <div class="slds-grid" slot="composedActions">
            <lightning-button-menu
                icon-name="utility:settings"
                alternative-text="Actions"
                menu-alignment="auto"
                onselect={handleMenuSelect}
            >
                <lightning-menu-item
                    label="Show Closed Plans"
                    value="showDescendantOpps"
                    checked={showClosedPlans}
                ></lightning-menu-item>
            </lightning-button-menu>
        </div>
    </c-pq-datatable>
</template>
