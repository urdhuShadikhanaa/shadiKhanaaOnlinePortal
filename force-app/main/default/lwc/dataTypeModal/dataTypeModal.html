<template>
    <c-modal header={labels.newDataType} onclosedialog={handleCancel}>
        <div
            if:true={error}
            class="error-box slds-align_absolute-center slds-theme_shade slds-theme_alert-texture slds-text-color_error"
        >
            {error}
        </div>
        <lightning-record-edit-form
            object-api-name="pqcrush__WS_Data_Type__c"
            onsuccess={handleSuccess}
            onsubmit={handleSubmit}
        >
            <div class="slds-m-around_medium">
                <lightning-input-field field-name="pqcrush__Label__c"></lightning-input-field>
                <lightning-input-field field-name="pqcrush__Data_Type__c"></lightning-input-field>
                <lightning-input-field field-name="pqcrush__Picklist_Values__c"></lightning-input-field>
                <lightning-input-field field-name="pqcrush__Color__c"></lightning-input-field>
                <div class="slds-m-top_medium">
                    <lightning-button variant="brand" type="submit" name="save" label={labels.createNewDataType}>
                    </lightning-button>
                </div>
            </div>
        </lightning-record-edit-form>
    </c-modal>
</template>
