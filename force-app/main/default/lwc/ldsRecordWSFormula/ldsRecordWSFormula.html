<template>
    <c-modal header={labels.newFormula} onclosedialog={handleCancel}>
        <div
            if:true={error}
            class="error-box slds-align_absolute-center slds-theme_shade slds-theme_alert-texture slds-text-color_error"
        >
            {error}
        </div>
        <lightning-record-edit-form object-api-name="pqcrush__WS_Summary_Formula__c" onsuccess={handleSuccess}>
            <div class="slds-m-around_medium">
                <lightning-input-field field-name="pqcrush__Label__c"></lightning-input-field>
                <lightning-input-field field-name="pqcrush__Color__c"></lightning-input-field>
                <lightning-input-field field-name="pqcrush__Formula__c"></lightning-input-field>
                <lightning-input-field field-name="pqcrush__Display_Type__c" value="Currency"></lightning-input-field>
                <lightning-input-field
                    field-name="pqcrush__White_Space__c"
                    value={whiteSpaceId}
                ></lightning-input-field>
                <div class="slds-m-top_medium">
                    <lightning-button variant="brand" type="submit" name="save" label={labels.createNewFormula}>
                    </lightning-button>
                </div>
            </div>
        </lightning-record-edit-form>
    </c-modal>
</template>
