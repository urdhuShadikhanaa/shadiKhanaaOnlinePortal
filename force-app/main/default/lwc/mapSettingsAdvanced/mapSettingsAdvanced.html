<template>
    <div class="page-section page-main">
        <h3 class="slds-section-title_divider slds-text-heading_small slds-p-horizontal_none">
            {labels.Advanced_Settings}
        </h3>
        <div class="slds-grid pro-grid slds-p-around_medium">
            <div class="slds-col">
                <lightning-spinner if:true={loading}></lightning-spinner>
                <template if:true={orgSettings}>
                    <table>
                        <tr>
                            <td>
                                <lightning-formatted-text
                                    value={labels.Prolifiq_Extended_Tools_URL}
                                ></lightning-formatted-text>
                            </td>
                            <td class="pro-text-align-right">
                                <lightning-input
                                    data-id="extendedURL"
                                    type="url"
                                    label=""
                                    placeholder="https://example.com"
                                    autocomplete="on"
                                    value={prolifiqExtendedToolsURL}
                                    onblur={onProlifiqExtendedToolsURL}
                                ></lightning-input>
                            </td>
                        </tr>
                    </table>
                </template>
            </div>
        </div>
    </div>
</template>
