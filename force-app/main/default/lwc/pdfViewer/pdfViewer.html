<template>
 <lightning-card title="Upload & View PDF" icon-name="doctype:pdf">
        <div class="slds-p-around_medium">
            <!-- File Input -->
            <input type="file" accept="application/pdf" onchange={handleFileChange}/>

            <!-- Upload Button -->
            <lightning-button label="Upload PDF" onclick={handleUpload} class="slds-m-top_small"></lightning-button>

            <!-- PDF Viewer -->
             <lightning-card title="File Preview and Download">
         <template for:each={filesList} for:item="file">
             <div key={file.value} class="slds-box">
                 <div class="slds-grid slds-wrap">
                     <div class="slds-col slds-large-size_4-of-12 slds-medium-size_4-of-12 slds-size_12-of-12">
                       <p><strong>FileName - </strong>{file.label}</p>
                     </div>
                     <div class="slds-col slds-large-size_4-of-12 slds-medium-size_4-of-12 slds-size_12-of-12">
                       <lightning-button label="Preview" 
                       variant="brand"
                      data-id={file.value}
                      onclick={previewHandler}
                       ></lightning-button>
                     </div>
                   </div>
             </div>
         </template>
    </lightning-card> 
        </div>
    </lightning-card>
</template>
