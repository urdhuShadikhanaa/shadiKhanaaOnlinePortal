<template>
    <!-- DATE -->
    <lightning-input
        data-id="inputDateArea"
        type="date"
        label={displayName}
        value={value}
        class="slds-truncate slds-p-bottom_xx-small"
        title={title}
        onwheel={preventValueChange}
        onchange={onValueChange}
    ></lightning-input>
</template>
