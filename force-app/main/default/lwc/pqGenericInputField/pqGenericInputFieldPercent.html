<template>
    <!-- PERCENT -->
    <lightning-input
        data-id="inputAmountArea"
        type="number"
        label={displayName}
        value={value}
        formatter="percent-fixed"
        step=".01"
        max="1000000000000"
        message-when-range-overflow={labels.AmountExceededOneTrillion}
        onfocus={onAmountFocus}
        onblur={cleanupAmount}
        class="slds-truncate slds-p-bottom_xx-small"
        title={title}
        onwheel={preventValueChange}
        onchange={onValueChange}
    ></lightning-input>
</template>
