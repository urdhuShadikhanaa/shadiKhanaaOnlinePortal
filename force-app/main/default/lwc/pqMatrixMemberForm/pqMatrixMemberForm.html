<template>
    <div class="container-class">
        <c-form-with-record-type-selection modal-title={title} onrecordtypeselected={handleRecordTypeSelected}>
            <c-pq-dynamic-matrix-member-form
                object-api-name={objectApiName}
                object-id={objectId}
                field-values={fieldValues}
                onsuccess={handleSuccess}
                onload={handleLoad}
                columns="1"
                record-type-id={recordTypeId}
                influence-data={influenceData}
                support-data={supportData}
                container-id={containerId}
            >
            </c-pq-dynamic-matrix-member-form>
            <div slot="footer">
                <lightning-button
                    variant="neutral"
                    label="Cancel"
                    class="slds-button"
                    onclick={hide}
                ></lightning-button>
                <lightning-button
                    variant="brand"
                    label="Save"
                    class="slds-button"
                    onclick={handleSave}
                ></lightning-button>
            </div>
        </c-form-with-record-type-selection>
    </div>
</template>
