<template>
    <div class={flexipageRegionWidth}>
        <template if:false={recordId}>
            <div class="engagementDiagram">
                <div class="column">
                    <div class="column-header">Please add this component to an Opportunity Record Page</div>
                </div>
            </div>
        </template>

        <template if:true={recordId}>
            <div class="surround">
                <template if:false={loaded}>
                    <lightning-spinner alternative-text="Loading"></lightning-spinner>
                </template>

                <template if:true={loaded}>
                    <template if:true={showTitle}>
                        <div class="diagramTitle">{diagramTitle}</div>
                    </template>

                    <template if:false={hasData}>
                        <div>{labels.No_Engagements}</div>
                    </template>

                    <div class="slds-grid slds-wrap engagementDiagram">
                        <template if:true={hasData}>
                            <table class="matrix">
                                <tr>
                                    <td class="corner"></td>
                                    <template for:each={viewModel.users} for:item="user">
                                        <td key={user.key} data-item={user.key} class="colHeader" title={user.text}>
                                            {user.textTrimmed}
                                        </td>
                                    </template>
                                </tr>
                                <template for:each={viewModel.matrix} for:item="matrixRow">
                                    <tr key={matrixRow.key}>
                                        <td class="rowHeader">{matrixRow.contact}</td>
                                        <template for:each={matrixRow.users} for:item="user">
                                            <td
                                                key={user.key}
                                                data-item={user.key}
                                                data-active={user.score}
                                                class="cell"
                                                onclick={displayToolTip}
                                            >
                                                <div class={user.class}>{user.score}</div>
                                                <c-pq-opportunity-engagement-tooltip
                                                    entry={user}
                                                    user={user.text}
                                                    contact={matrixRow.contact}
                                                    collection="matrix"
                                                    data-item={user.key}
                                                ></c-pq-opportunity-engagement-tooltip>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </table>
                        </template>
                    </div>
                </template>

                <div class="refresher">
                    <lightning-button
                        label={labels.Refresh_Engagement_Data}
                        onclick={handleRefresh}
                        class="slds-align_absolute-center"
                    ></lightning-button>
                </div>
            </div>
        </template>
    </div>
</template>
