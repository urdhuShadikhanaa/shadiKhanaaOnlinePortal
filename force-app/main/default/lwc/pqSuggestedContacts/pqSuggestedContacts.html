<template>
    <!-- <template lwc:if={showSuggestedContacts}> -->
    <c-pq-card-lwc title="Suggested Contacts">
        <lightning-spinner if:false={loaded} alternative-text="Loading" size="small"></lightning-spinner>
        <template lwc:if={resultJsonList.length}>
            <div slot="actions">
                <div class="slds-grid">
                    <div class="slds-col">
                        <lightning-button-icon
                            class="refresh-button"
                            alternative-text="Refresh"
                            icon-name="utility:refresh"
                            onclick={handleRefresh}
                        ></lightning-button-icon>
                    </div>
                </div>
            </div>

            <lightning-datatable
                data-id="datatable"
                key-field="contactId"
                data={resultJsonList}
                columns={columns}
                onrowselection={handleRowSelect}
                selected-rows={selectedContactsSize}
                column-widths-mode="fixed"
            >
            </lightning-datatable>
            <div class="slds-align_absolute-center" style="margin-top: 2%">
                <lightning-button
                    label="Previous"
                    icon-name="utility:chevronleft"
                    onclick={previousHandler}
                    disabled={isPreviousDisable}
                >
                </lightning-button>
                <span class="slds-badge slds-badge_lightest" style="margin-right: 10px; margin-left: 10px">
                    Displaying {startingRecord} to {endingRecord} of {totalRecountCount} records. Page {page} of
                    {totalPage}.
                </span>
                <lightning-button
                    label="Next"
                    icon-name="utility:chevronright"
                    icon-position="right"
                    onclick={nextHandler}
                    disabled={isNextDisable}
                >
                </lightning-button>
            </div>
            <div class="slds-m-around_small slds-text-align_right">
                <lightning-button
                    variant="brand"
                    label="Add Contacts To Map"
                    title="Add Contacts To Map"
                    icon-name="utility:insert_template"
                    onclick={handleAddSelectedRec}
                    disabled={disableAddSelectedRecButton}
                >
                </lightning-button>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-text-align_center slds-text-heading_small">
                There are currently no suggested contacts available.
            </div>
        </template>
    </c-pq-card-lwc>
    <!-- </template> -->
</template>
