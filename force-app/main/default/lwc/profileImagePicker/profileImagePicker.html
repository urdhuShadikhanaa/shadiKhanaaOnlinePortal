<template>
    <c-modal header={labels.title}>
        <div
            if:true={errorMessage}
            class="error-box slds-align_absolute-center slds-theme_shade slds-theme_alert-texture slds-text-color_error"
        >
            {errorMessage}
        </div>

        <div
            class={dropCSS}
            ondrop={fileDropHandler}
            ondragover={fileDragOverHandler}
            ondragleave={fileDragLeaveHandler}
        >
            <div class={dropInstructionsCSS} onclick={openFileDialog}>
                <span><strong>Choose a file</strong> or drag it here.</span>
                <br />
                <svg class="drop-icon" xmlns="http://www.w3.org/2000/svg" width="50" height="43" viewBox="0 0 50 43">
                    <path
                        d="M48.4 26.5c-.9 0-1.7.7-1.7 1.7v11.6h-43.3v-11.6c0-.9-.7-1.7-1.7-1.7s-1.7.7-1.7 1.7v13.2c0 .9.7 1.7 1.7 1.7h46.7c.9 0 1.7-.7 1.7-1.7v-13.2c0-1-.7-1.7-1.7-1.7zm-24.5 6.1c.3.3.8.5 1.2.5.4 0 .9-.2 1.2-.5l10-11.6c.7-.7.7-1.7 0-2.4s-1.7-.7-2.4 0l-7.1 8.3v-25.3c0-.9-.7-1.7-1.7-1.7s-1.7.7-1.7 1.7v25.3l-7.1-8.3c-.7-.7-1.7-.7-2.4 0s-.7 1.7 0 2.4l10 11.6z"
                    ></path>
                </svg>
                <br />
                <span if:true={imageBakerEnabled}>or paste an photo Url below</span>
            </div>
            <div>
                <c-image-cropper
                    image-data={imageData}
                    class={imageToolsCSS}
                    show-image-tools={imageToolsShown}
                    width="400"
                    height="400"
                    max-width="400"
                    max-height="400"
                    min-width="200"
                    min-height="200"
                ></c-image-cropper>
            </div>
        </div>

        <input
            id="fileinput"
            type="file"
            class="file-input"
            onchange={handleFilesChange}
            accept="image/bmp,image/jpeg,image/x-png,image/png,image/gif"
        />

        <lightning-tabset>
            <lightning-tab if:true={imageBakerEnabled} label={labels.photoUrl} onactive={handlePhotoUrlTabActive}>
                <lightning-input
                    type="text"
                    placeholder="Enter a photo URL"
                    onchange={handlePhotoUrlEntered}
                ></lightning-input>
                <lightning-button
                    class="download-button"
                    label="Download Photo from URL"
                    onclick={handleDownloadPhotoUrl}
                >
                </lightning-button>
            </lightning-tab>
            <lightning-tab label={labels.uploadImage} onactive={handleUploadTabActive}>
                <lightning-button
                    class="browse-button"
                    label="Browse for images"
                    onclick={openFileDialog}
                    ondrop={fileDropHandler}
                >
                </lightning-button>
            </lightning-tab>
        </lightning-tabset>

        <div slot="footer">
            <lightning-button
                class="footer-button"
                label="Cancel"
                variant="neutral"
                onclick={handleCancel}
            ></lightning-button>
            <lightning-button
                class="footer-button"
                label="Save"
                variant="brand"
                onclick={handleSave}
                disabled={saveButtonDisabled}
            ></lightning-button>
        </div>
    </c-modal>
</template>
