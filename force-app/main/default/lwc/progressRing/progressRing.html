<template>
    <div class={progressRingClass}>
        <div
            class="slds-progress-ring__progress"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
        >
            <svg viewBox="-1 -1 2 2">
                <path class="slds-progress-ring__path" id="slds-progress-ring-path-53" d={updateProgressBar}></path>
            </svg>
        </div>
        <div class="slds-progress-ring__content">
            <template if:true={hasVariant}>
                <lightning-icon icon-name={iconName} alternative-text={altText} variant={variant}></lightning-icon>
            </template>
            <template if:false={hasVariant}>
                {defaultContent}
            </template>
        </div>
    </div>
</template>
