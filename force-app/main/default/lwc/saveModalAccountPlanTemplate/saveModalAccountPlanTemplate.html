<template>
    <!-- modal start -->
    <template if:true={isShowModal}>
        <div>
            <section
                role="dialog"
                tabindex="-1"
                aria-labelledby="modal-heading-01"
                aria-modal="true"
                aria-describedby="modal-content-id-1"
                class="slds-modal slds-fade-in-open"
            >
                <lightning-spinner
                    alternative-text="Loading"
                    variant="brand"
                    size="medium"
                    if:true={isOuterSpinner}
                ></lightning-spinner>
                <div class="slds-modal__container">
                    <!-- modal header start -->
                    <header class="slds-modal__header">
                        <button
                            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close"
                            onclick={hideModalBox}
                        >
                            <lightning-icon
                                icon-name="utility:close"
                                alternative-text="close"
                                variant="inverse"
                                size="small"
                            ></lightning-icon>
                            <span class="slds-assistive-text">{Close}</span>
                        </button>
                        <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">{SaveTemplate}</h2>
                    </header>

                    <!-- modal body start -->

                    <div class="mainDivModal" id="modal-content-id-1">
                        <div class="insideBody">
                            <lightning-spinner
                                alternative-text="Loading"
                                size="small"
                                if:true={isSpinner}
                            ></lightning-spinner>
                            <div class="inputFieldCls">
                                <label class="required labelCls">{Template_Name}</label>
                                <input
                                    value={nameOfTemplate}
                                    type="text"
                                    onkeyup={handletemplateName}
                                    placeholder="Enter Template Name"
                                    class="inputField"
                                    lwc:ref="nameTemplate"
                                />
                                <span class="displayDuplicateMsg">{message}</span>
                            </div>
                            <lightning-input
                                label={Save_as_default}
                                class="saveAsDraftCheckbox"
                                type="checkbox"
                                value=""
                            >
                            </lightning-input>
                        </div>
                    </div>

                    <!-- modal footer start-->
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_destructive cancleBtn" onclick={hideModalBox}>
                            {Cancel}
                        </button>
                        <button
                            class="slds-button slds-button_brand saveBtn"
                            lwc:ref="submitBtn"
                            onclick={handleSubmit}
                            disabled
                        >
                            {Submit}
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>
    <!-- modal end -->
</template>
