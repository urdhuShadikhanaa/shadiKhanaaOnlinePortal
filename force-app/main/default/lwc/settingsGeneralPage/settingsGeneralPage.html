<template>

        <div class="slds-grid pro-grid slds-var-p-around_medium">

                            if:false={loading}
                            type="toggle"
                            variant="label-hidden"
                            checked={allowAddTask}
                            message-toggle-active={labels.Enabled}
                            message-toggle-inactive={labels.Disabled}
                            onchange={handleAllowAddTaskToggled}
                        ></lightning-input>
                    </div>
                    <div class="pro-span-content slds-grid_vertical-align-center slds-p-vertical_xxx-small">
                        <lightning-formatted-text

                            variant="label-hidden"

                            onchange={handleAllowTasksBasedObjStageToggled}
                        ></lightning-input>

                        <lightning-formatted-text value={labels.Use_Default_AP_Scoring}></lightning-formatted-text>

                            type="toggle"
                            variant="label-hidden"
                            checked={useDefaultAPScoring}

                            message-toggle-inactive={labels.Disabled}
                            onchange={handleDefaultScoringToggled}

                    </div>
                    <div class="pro-span-content slds-grid_vertical-align-center slds-p-vertical_xxx-small">

                        <lightning-input
                            if:false={loading}
                            type="toggle"
                            variant="label-hidden"
                            checked={disableSortButton}
                            message-toggle-active={labels.Enabled}
                            message-toggle-inactive={labels.Disabled}
                            onchange={handleDisableSortToggled}
                        ></lightning-input>
                    </div>
                </template>
            </div>
        </div>
        <div class="slds-grid pro-grid slds-var-p-around_medium objective-container">
            <div class="slds-col">
                <lightning-spinner if:true={loading}></lightning-spinner>

                            if:false={loading}
                            type="color"
                            name="lowColor"
                            value={scoreSettings.lowColor}
                            variant="label-hidden"
                            onchange={handleScoreSettingsChanged}
                        ></lightning-input>
                    </div>
                    <div class="pro-span-content slds-grid_vertical-align-center slds-p-vertical_xxx-small">
                        <lightning-formatted-text value={labels.Mid_Color}></lightning-formatted-text>
                        <lightning-input

                            type="color"

                            onchange={handleScoreSettingsChanged}

                        <lightning-input
                            if:false={loading}
                            type="number"
                            name="lowMidBoundary"
                            value={scoreSettings.lowMidBoundary}
                            formatter="percent"
                            step="0.01"
                            variant="label-hidden"
                            onchange={handleScoreSettingsChanged}
                        >
                        </lightning-input>
                    </div>
                    <div class="pro-span-content slds-grid_vertical-align-center slds-p-vertical_xxx-small">
