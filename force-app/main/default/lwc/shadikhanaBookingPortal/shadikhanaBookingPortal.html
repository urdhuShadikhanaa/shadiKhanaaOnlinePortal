<template>
    <div class="portal">
        <div class="portal-theme-layer" style={portalThemeLayerStyle} aria-hidden="true"></div>
        <header class="portal-header slds-p-around_medium">
            <div class="portal-header__backdrop" style={portalHeaderBackdropStyle} aria-hidden="true"></div>
            <div class="portal-header__content">
                <div class="portal-header__intro">
                    <p class="portal-kicker">{portalKickerLabel}</p>
                    <h1 class="portal-title">Reservation Portal</h1>
                    <p class="portal-subtitle">
                        Browse the venue and submit a booking request. Calendar dates are reserved only after admin approval.
                    </p>
                </div>
                <div class="portal-content-header" class:portal-content-header_guest={isGuestUser}>
                    <template if:false={isGuestUser}>
                        <div class="portal-content-header__item">
                            <lightning-icon icon-name="utility:user" size="x-small" class="portal-content-header__icon"></lightning-icon>
                            <div>
                                <p class="portal-content-header__label">Signed in as</p>
                                <p class="portal-content-header__value">{userName}</p>
                            </div>
                        </div>
                        <div class="portal-content-header__divider" role="presentation"></div>
                    </template>
                    <div class="portal-content-header__item">
                        <lightning-icon icon-name="utility:clock" size="x-small" class="portal-content-header__icon"></lightning-icon>
                        <div>
                            <p class="portal-content-header__label">Current time · {browserTimeZone}</p>
                            <p class="portal-content-header__value portal-content-header__time">{currentTimeDisplay}</p>
                        </div>
                    </div>
                    <template if:false={isGuestUser}>
                        <lightning-button
                            label="Logout"
                            title="Sign out of the portal"
                            icon-name="utility:logout"
                            variant="neutral"
                            class="portal-logout-btn"
                            onclick={handleLogout}>
                        </lightning-button>
                    </template>
                    <template if:true={isGuestUser}>
                        <lightning-button
                            label="Login"
                            title="Sign in to the portal"
                            icon-name="utility:login"
                            variant="brand"
                            class="portal-login-btn"
                            onclick={handleHeaderLogin}>
                        </lightning-button>
                    </template>
                </div>
            </div>
        </header>

        <template if:true={showPriceDropMarquee}>
            <section class="price-drop-marquee" aria-label="Special pricing offers this month">
                <div class="price-drop-marquee__glow" aria-hidden="true"></div>
                <div class="price-drop-marquee__badge">
                    <span class="price-drop-marquee__badge-pulse" aria-hidden="true"></span>
                    <span class="price-drop-marquee__badge-text">Special Offer</span>
                </div>
                <div class="price-drop-marquee__viewport">
                    <div class="price-drop-marquee__track">
                        <div class="price-drop-marquee__group">
                            <span class="price-drop-marquee__lead">{priceDropMarqueeLead}</span>
                            <template for:each={priceDropOffers} for:item="offer">
                                <span key={offer.marqueeKey} class="price-drop-marquee__chip">
                                    <span class="price-drop-marquee__chip-date">{offer.shortDateLabel}</span>
                                    <span class="price-drop-marquee__chip-rate">{offer.rateLabel}/day</span>
                                    <span class="price-drop-marquee__chip-save">Save {offer.savingsLabel}</span>
                                </span>
                            </template>
                            <span class="price-drop-marquee__cta">Book Urdu Shadikhana now — offers end when dates pass!</span>
                        </div>
                        <div class="price-drop-marquee__group" aria-hidden="true">
                            <span class="price-drop-marquee__lead">{priceDropMarqueeLead}</span>
                            <template for:each={priceDropOffers} for:item="offer">
                                <span key={offer.marqueeKeyCopy} class="price-drop-marquee__chip">
                                    <span class="price-drop-marquee__chip-date">{offer.shortDateLabel}</span>
                                    <span class="price-drop-marquee__chip-rate">{offer.rateLabel}/day</span>
                                    <span class="price-drop-marquee__chip-save">Save {offer.savingsLabel}</span>
                                </span>
                            </template>
                            <span class="price-drop-marquee__cta">Book Urdu Shadikhana now — offers end when dates pass!</span>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template if:true={hasCelebrationBanners}>
            <section class="celebration-wishes" aria-label="Today's wishes">
                <header class="celebration-wishes__label">
                    <span class="celebration-wishes__label-dot" aria-hidden="true"></span>
                    Today's Wishes
                </header>
                <div class="celebration-wishes__list">
                    <template for:each={celebrationBanners} for:item="celebration">
                        <article key={celebration.key} class={celebration.cssClass}>
                            <div class="celebration-wish__accent" aria-hidden="true"></div>
                            <div class="celebration-wish__pattern" aria-hidden="true"></div>
                            <div class="celebration-wish__shine" aria-hidden="true"></div>
                            <span class="celebration-wish__deco" aria-hidden="true">{celebration.decoEmoji}</span>
                            <div class="celebration-wish__body">
                                <div class="celebration-wish__head">
                                    <span class="celebration-wish__emoji-wrap" aria-hidden="true">
                                        <span class="celebration-wish__emoji">{celebration.emoji}</span>
                                    </span>
                                    <div class="celebration-wish__meta">
                                        <span class="celebration-wish__badge">Today · {celebration.badgeLabel}</span>
                                        <p class="celebration-wish__tagline">{celebration.tagline}</p>
                                        <p class="celebration-wish__event">{celebration.eventLabel}</p>
                                    </div>
                                </div>
                                <h3 class="celebration-wish__title">{celebration.title}</h3>
                                <p class="celebration-wish__message">{celebration.message}</p>
                            </div>
                        </article>
                    </template>
                </div>
            </section>
        </template>

        <div class="portal-layout">
            <aside class="sidebar panel">
                <p class="sidebar__title">Navigation</p>
                <nav class="sidebar-nav">
                    <template for:each={navItems} for:item="item">
                        <div key={item.id} class="sidebar-nav__group">
                            <button
                                class={item.className}
                                data-tab={item.id}
                                onclick={handleNavClick}
                            >
                                <span class="sidebar-nav__item-content">
                                    <lightning-icon icon-name={item.iconName} size="x-small"></lightning-icon>
                                    <span>{item.label}</span>
                                </span>
                                <span class="sidebar-nav__item-meta">
                                    <template if:true={item.locked}>
                                        <lightning-icon
                                            icon-name="utility:lock"
                                            size="xx-small"
                                            class="sidebar-nav__lock-icon"
                                            alternative-text="Sign in required"
                                        ></lightning-icon>
                                    </template>
                                    <template if:true={item.showChevron}>
                                        <lightning-icon
                                            icon-name={item.chevronIcon}
                                            size="xx-small"
                                            class="sidebar-nav__chevron"
                                            alternative-text="Expand administration menu"
                                        ></lightning-icon>
                                    </template>
                                </span>
                            </button>

                            <template if:true={item.showSubNav}>
                                <div
                                    class={item.subNavClassName}
                                    aria-hidden={item.subNavHidden}
                                    aria-label="Administration sections"
                                >
                                    <template for:each={adminSubNavItems} for:item="subItem">
                                        <button
                                            key={subItem.id}
                                            class={subItem.className}
                                            data-admin-section={subItem.id}
                                            onclick={handleAdminSubNavClick}
                                        >
                                            <lightning-icon
                                                icon-name={subItem.iconName}
                                                size="xx-small"
                                                class="sidebar-subnav__icon"
                                            ></lightning-icon>
                                            <span>{subItem.label}</span>
                                        </button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </nav>
            </aside>

            <main class="portal-content">
                <template if:true={isHomeTab}>
                    <section class="panel venue-review venue-review_themed slds-m-bottom_small">
                        <div class="venue-review__layout">
                            <div class="venue-review__hero">
                                <span class="venue-review__badge">Urdu Shadikhana</span>
                                <div class="panel__header panel__header_compact venue-review__header">
                                    <div>
                                        <h2>Review the Shadikhana</h2>
                                        <p>Browse the venue photos before you submit your booking request.</p>
                                    </div>
                                </div>
                            </div>

                            <aside class="venue-review__aside">
                                <div class="address-card address-card_review">
                                    <div class="address-card__header">
                                        <lightning-icon icon-name="utility:checkin" size="x-small"></lightning-icon>
                                        <h3>Venue Address</h3>
                                    </div>
                                    <p class="address-card__full">{fullAddress}</p>
                                    <dl class="address-card__details">
                                        <template for:each={addressLines} for:item="line">
                                            <div key={line.id} class="address-line">
                                                <dt>{line.label}</dt>
                                                <dd>{line.value}</dd>
                                            </div>
                                        </template>
                                    </dl>
                                    <a class="address-card__map-link" href={mapsUrl} target="_blank" rel="noopener noreferrer">
                                        Open location in Google Maps
                                    </a>
                                </div>
                            </aside>

                            <div class="gallery gallery_review venue-review__gallery">
                                    <div class="gallery-main gallery-main_review">
                                        <img
                                            src={selectedVenueImage.url}
                                            alt={selectedVenueImage.label}
                                            class="gallery-main__image"
                                        />
                                        <div class="gallery-main__caption">
                                            <strong>{selectedVenueImage.label}</strong>
                                            <span>{selectedVenueImage.caption}</span>
                                        </div>
                                        <div class="gallery-main__nav">
                                            <lightning-button-icon
                                                icon-name="utility:chevronleft"
                                                alternative-text="Previous photo"
                                                onclick={handlePreviousImage}
                                            ></lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:chevronright"
                                                alternative-text="Next photo"
                                                onclick={handleNextImage}
                                            ></lightning-button-icon>
                                        </div>
                                    </div>

                                    <div class="gallery-thumbs gallery-thumbs_review">
                                        <template for:each={galleryThumbnails} for:item="image">
                                            <button
                                                key={image.id}
                                                class={image.thumbClass}
                                                data-index={image.index}
                                                onclick={handleSelectImage}
                                                title={image.label}
                                            >
                                                <img src={image.url} alt={image.label} />
                                            </button>
                                        </template>
                                    </div>
                                </div>
                        </div>
                    </section>

                    <div class={homeBookingLayoutClass}>
                        <section class="home-booking-layout__form">
                            <article class="panel request-form-panel">
                                <div class="request-form-hero request-form-hero_compact">
                                    <div class="request-form-hero__intro">
                                        <span class="request-form-hero__badge">Booking Application</span>
                                        <h2 class="request-form-hero__title">Request Your Event Date</h2>
                                    </div>
                                </div>

                                <div class="request-form-steps request-form-steps_chevron" aria-label="Booking steps">
                                    <div
                                        class={bookingWizardStep1ChevronClass}
                                        data-step="1"
                                        role="button"
                                        tabindex="0"
                                        aria-current={bookingWizardStep1AriaCurrent}
                                        onclick={handleBookingWizardStepClick}
                                    >
                                        <div class="request-form-step-chevron__copy">
                                            <p class="request-form-step-chevron__title">Dates</p>
                                        </div>
                                    </div>
                                    <div
                                        class={bookingWizardStep2ChevronClass}
                                        data-step="2"
                                        role="button"
                                        tabindex="0"
                                        aria-current={bookingWizardStep2AriaCurrent}
                                        onclick={handleBookingWizardStepClick}
                                    >
                                        <div class="request-form-step-chevron__copy">
                                            <p class="request-form-step-chevron__title">Event</p>
                                        </div>
                                    </div>
                                    <div
                                        class={bookingWizardStep3ChevronClass}
                                        data-step="3"
                                        role="button"
                                        tabindex="0"
                                        aria-current={bookingWizardStep3AriaCurrent}
                                        onclick={handleBookingWizardStepClick}
                                    >
                                        <div class="request-form-step-chevron__copy">
                                            <p class="request-form-step-chevron__title">Contact</p>
                                        </div>
                                    </div>
                                    <div
                                        class={bookingWizardStep4ChevronClass}
                                        data-step="4"
                                        role="button"
                                        tabindex="0"
                                        aria-current={bookingWizardStep4AriaCurrent}
                                        onclick={handleBookingWizardStepClick}
                                    >
                                        <div class="request-form-step-chevron__copy">
                                            <p class="request-form-step-chevron__title">Preview</p>
                                        </div>
                                    </div>
                                </div>

                                <p class="booking-wizard-step-message">{bookingWizardStepMessage}</p>

                                <div class="request-form-panel__body">
                                <div class="booking-form slds-form slds-form_stacked">
                                    <template if:true={isBookingWizardStep1}>
                                    <div class="form-section-card form-section-card_step form-section-card_compact">
                                        <div class="form-step-dates-layout">
                                            <div class="form-step-dates-layout__fields">
                                                <div class="form-date-picker__summary">
                                                    <div class="form-date-field">
                                                        <label class="form-date-field__label" for="booking-from-date">
                                                            From Date <span class="form-field-required" aria-hidden="true">*</span>
                                                        </label>
                                                        <input
                                                            id="booking-from-date"
                                                            class="form-date-field__input"
                                                            type="text"
                                                            inputmode="numeric"
                                                            autocomplete="off"
                                                            placeholder="DD/MM/YYYY"
                                                            value={fromDateText}
                                                            data-field="selectedDate"
                                                            oninput={handleDateTextInput}
                                                            onchange={handleDateInputChange}
                                                            onblur={handleDateInputChange}
                                                            required
                                                        />
                                                    </div>
                                                    <div class="form-date-field">
                                                        <label class="form-date-field__label" for="booking-to-date">
                                                            To Date <span class="form-field-required" aria-hidden="true">*</span>
                                                        </label>
                                                        <input
                                                            id="booking-to-date"
                                                            class="form-date-field__input"
                                                            type="text"
                                                            inputmode="numeric"
                                                            autocomplete="off"
                                                            placeholder="DD/MM/YYYY"
                                                            value={toDateText}
                                                            data-field="selectedEndDate"
                                                            oninput={handleDateTextInput}
                                                            onchange={handleDateInputChange}
                                                            onblur={handleDateInputChange}
                                                            required
                                                        />
                                                    </div>
                                                </div>

                                                <template if:true={isDesktopLayout}>
                                                    <div class="form-row form-row_two-col time-fields time-fields_desktop time-fields_compact">
                                                        <lightning-input
                                                            type="time"
                                                            label="Start time"
                                                            value={eventStartTime}
                                                            data-field="eventStartTime"
                                                            onchange={handleInputChange}
                                                            required
                                                        ></lightning-input>
                                                        <lightning-input
                                                            type="time"
                                                            label="End time"
                                                            value={eventEndTime}
                                                            data-field="eventEndTime"
                                                            onchange={handleInputChange}
                                                            required
                                                        ></lightning-input>
                                                    </div>
                                                </template>
                                            </div>

                                            <div class="form-date-picker form-date-picker_inline">
                                                <template if:true={isDateSelectionLoading}>
                                                    <div class="form-date-picker__loading" role="status" aria-live="polite">
                                                        <lightning-spinner
                                                            alternative-text="Updating dates"
                                                            size="small"
                                                        ></lightning-spinner>
                                                    </div>
                                                </template>

                                                <div class="form-date-picker__nav form-date-picker__nav_compact">
                                                    <lightning-button-icon
                                                        icon-name="utility:chevronleft"
                                                        alternative-text="Previous month"
                                                        onclick={handlePrevMonth}
                                                        disabled={isPrevMonthDisabled}
                                                    ></lightning-button-icon>
                                                    <span class="calendar-month">{monthLabel}</span>
                                                    <lightning-button-icon
                                                        icon-name="utility:chevronright"
                                                        alternative-text="Next month"
                                                        onclick={handleNextMonth}
                                                    ></lightning-button-icon>
                                                </div>

                                                <div class="form-date-picker__calendar-wrap">
                                                    <div class="form-calendar-grid calendar-grid calendar-grid_compact calendar-grid_form-inline">
                                                    <template for:each={weekdayLabels} for:item="weekday">
                                                        <div key={weekday} class="calendar-weekday">{weekday}</div>
                                                    </template>

                                                    <template for:each={calendarDays} for:item="day">
                                                        <button
                                                            key={day.formKey}
                                                            class={day.cellClass}
                                                            data-date={day.isoDate}
                                                            data-reserved={day.isReserved}
                                                            data-past={day.isPast}
                                                            data-beforestart={day.isBeforeStart}
                                                            data-current={day.isCurrentMonth}
                                                            aria-label={day.ariaLabel}
                                                            title={day.hoverTitle}
                                                            onclick={handleDayClick}
                                                            disabled={day.isFormDisabled}
                                                        >
                                                            <span>{day.label}</span>
                                                            <template if:true={day.showSidebarDailyRate}>
                                                                <span class="calendar-day__rate">
                                                                    <span class="calendar-day__rate-amount calendar-day__rate-amount_full">{day.dailyRateAmount}</span>
                                                                    <span class="calendar-day__rate-amount calendar-day__rate-amount_compact">{day.dailyRateAmountCompact}</span>
                                                                    <span class="calendar-day__rate-unit">/day</span>
                                                                </span>
                                                            </template>
                                                            <template if:true={day.isPartialConfirmedEnd}>
                                                                <span class="calendar-day__badge calendar-day__badge_partial">9 AM</span>
                                                            </template>
                                                            <template if:true={day.isConfirmedBlocked}>
                                                                <span class="calendar-day__badge calendar-day__badge_confirmed">Booked</span>
                                                            </template>
                                                            <template if:true={day.isPending}>
                                                                <span class="calendar-day__badge calendar-day__badge_pending">Pending</span>
                                                            </template>
                                                        </button>
                                                    </template>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <template if:false={isDesktopLayout}>
                                            <div class="form-row form-row_two-col time-fields time-fields_mobile">
                                                <div class="time-picker">
                                                    <p class="time-picker__label">Start Time (on from date)</p>
                                                    <div class="time-picker__controls">
                                                        <lightning-combobox
                                                            label="Hour"
                                                            variant="label-hidden"
                                                            value={startTimeHour}
                                                            options={timeHourOptions}
                                                            data-time-scope="start"
                                                            data-time-part="hour"
                                                            onchange={handleTimePartChange}
                                                        ></lightning-combobox>
                                                        <span class="time-picker__separator">:</span>
                                                        <lightning-combobox
                                                            label="Minute"
                                                            variant="label-hidden"
                                                            value={startTimeMinute}
                                                            options={timeMinuteOptions}
                                                            data-time-scope="start"
                                                            data-time-part="minute"
                                                            onchange={handleTimePartChange}
                                                        ></lightning-combobox>
                                                        <lightning-combobox
                                                            label="AM or PM"
                                                            variant="label-hidden"
                                                            value={startTimePeriod}
                                                            options={timePeriodOptions}
                                                            data-time-scope="start"
                                                            data-time-part="period"
                                                            onchange={handleTimePartChange}
                                                        ></lightning-combobox>
                                                    </div>
                                                    <p class="time-picker__display">{formattedStartTimeDisplay}</p>
                                                </div>
                                                <div class="time-picker">
                                                    <p class="time-picker__label">End Time (on to date)</p>
                                                    <div class="time-picker__controls">
                                                        <lightning-combobox
                                                            label="Hour"
                                                            variant="label-hidden"
                                                            value={endTimeHour}
                                                            options={timeHourOptions}
                                                            data-time-scope="end"
                                                            data-time-part="hour"
                                                            onchange={handleTimePartChange}
                                                        ></lightning-combobox>
                                                        <span class="time-picker__separator">:</span>
                                                        <lightning-combobox
                                                            label="Minute"
                                                            variant="label-hidden"
                                                            value={endTimeMinute}
                                                            options={timeMinuteOptions}
                                                            data-time-scope="end"
                                                            data-time-part="minute"
                                                            onchange={handleTimePartChange}
                                                        ></lightning-combobox>
                                                        <lightning-combobox
                                                            label="AM or PM"
                                                            variant="label-hidden"
                                                            value={endTimePeriod}
                                                            options={timePeriodOptions}
                                                            data-time-scope="end"
                                                            data-time-part="period"
                                                            onchange={handleTimePartChange}
                                                        ></lightning-combobox>
                                                    </div>
                                                    <p class="time-picker__display">{formattedEndTimeDisplay}</p>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                    </template>

                                    <template if:true={isBookingWizardStep2}>
                                    <div class="form-section-card form-section-card_step form-section-card_clean">
                                        <div class="hall-info-panel">
                                            <h3 class="hall-info-panel__title">About the hall</h3>
                                            <p class="hall-info-panel__text">{hallInfoSummary}</p>
                                        </div>

                                        <div class="form-event-grid">
                                            <div class="form-event-grid__field">
                                                <lightning-combobox
                                                    label="Event type"
                                                    value={eventType}
                                                    options={eventTypeOptions}
                                                    data-field="eventType"
                                                    onchange={handleInputChange}
                                                    required
                                                ></lightning-combobox>
                                            </div>
                                            <div class="form-event-grid__field">
                                                <lightning-combobox
                                                    label="Decorations"
                                                    value={decorationArrangement}
                                                    options={serviceArrangementOptions}
                                                    data-field="decorationArrangement"
                                                    onchange={handleInputChange}
                                                    required
                                                ></lightning-combobox>
                                            </div>

                                            <template if:true={showCustomEventName}>
                                                <div class="form-event-grid__field form-event-grid__field_full">
                                                    <lightning-input
                                                        label="Event name"
                                                        value={eventName}
                                                        data-field="eventName"
                                                        onchange={handleInputChange}
                                                        required
                                                    ></lightning-input>
                                                </div>
                                            </template>

                                            <div class="form-event-grid__field">
                                                <lightning-input
                                                    type="number"
                                                    label="Expected guest count"
                                                    value={expectedGuestCount}
                                                    data-field="expectedGuestCount"
                                                    onchange={handleInputChange}
                                                    min="1"
                                                    max={hallSeatingCapacity}
                                                    required
                                                ></lightning-input>
                                            </div>
                                            <div class="form-event-grid__field">
                                                <lightning-combobox
                                                    label="Catering"
                                                    value={cateringArrangement}
                                                    options={serviceArrangementOptions}
                                                    data-field="cateringArrangement"
                                                    onchange={handleInputChange}
                                                    required
                                                ></lightning-combobox>
                                            </div>

                                            <div class="form-event-grid__field form-event-grid__field_details">
                                                <lightning-textarea
                                                    label="Event details (optional)"
                                                    value={eventDetails}
                                                    data-field="eventDetails"
                                                    onchange={handleInputChange}
                                                    placeholder="Seating setup, stage, special requirements"
                                                ></lightning-textarea>
                                            </div>
                                            <div class="form-event-grid__field form-event-grid__field_charges">
                                                <div class="event-charge-panel" aria-live="polite">
                                                    <h4 class="event-charge-panel__title">Estimated charges</h4>
                                                    <dl class="event-charge-panel__list">
                                                        <div class="event-charge-panel__row">
                                                            <dt>Hall rental</dt>
                                                            <dd>{bookingPriceHallRentalLabel}</dd>
                                                        </div>
                                                        <div class="event-charge-panel__row">
                                                            <dt>Decoration</dt>
                                                            <dd>{eventStepDecorationChargeLabel}</dd>
                                                        </div>
                                                        <div class="event-charge-panel__row">
