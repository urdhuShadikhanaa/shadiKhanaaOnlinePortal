<template>
    <svg
        version="1.1"
        baseProfile="full"
        width={width}
        height={height}
        viewBox={svgData.viewBox}
        xmlns="http://www.w3.org/2000/svg"
    >
        <template for:each={svgDataPaths} for:item="svgDataPath">
            <path key={svgDataPath.key} style={svgData.pathStyle} d={svgDataPath.path}></path>
        </template>
    </svg>
</template>
