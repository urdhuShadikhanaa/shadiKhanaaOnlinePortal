<template>
    <div class="slds-card__header slds-grid">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
            <div class="slds-media__body">
                <h2 class="slds-card__header-title">
                    <span if:false={showRecordPageNavLink} class="slds-text-heading_small slds-truncate"
                        >{labels.wsTitle}</span
                    >
                    <a
                        if:true={showRecordPageNavLink}
                        class="slds-var-m-left_x-small"
                        onclick={navigateToRecordViewPage}
                        >{labels.wsTitle}</a
                    >
                </h2>
            </div>
            <div class="slds-grid">
                <lightning-button-icon
                    value={labels.refresh}
                    alternative-text={labels.refresh}
                    icon-name="utility:refresh"
                    onclick={handleClick}
                ></lightning-button-icon>
                <lightning-button-icon
                    if:true={showHierarchyButton}
                    value={labels.toggleParents}
                    alternative-text={labels.toggleParents}
                    class="slds-var-m-left_xx-small"
                    icon-name="utility:hierarchy"
                    onclick={handleClick}
                ></lightning-button-icon>
                <c-pq-popover-button
                    title={labels.filter}
                    class="slds-var-m-left_xx-small pq-print-enabled-button"
                    onopenpopover={passthroughEvent}
                >
                    <div slot="popover-body">
                        <lightning-input
                            type="checkbox"
                            label={labels.showUnhighlighted}
                            name="showUnhighlighted"
                            checked={showUnhighlghted}
                            class="slds-var-p-horizontal_small"
                            onchange={handleShowUnhighlightedChange}
                        ></lightning-input>
                        <lightning-checkbox-group
                            class="
                                slds-border_bottom
                                slds-var-p-vertical_x-small
                                slds-var-p-horizontal_small
                                slds-dropdown_length-5
                            "
                            name="highlights"
                            label={labels.highlights}
                            options={highlights}
                            value={highlightsSelected}
                            onchange={handleFiltersChange}
                        >
                        </lightning-checkbox-group>
                        <lightning-checkbox-group
                            class="
                                slds-border_bottom
                                slds-var-p-vertical_x-small
                                slds-var-p-horizontal_small
                                slds-dropdown_length-5
                            "
                            name="amountTypes"
                            label={labels.amountTypes}
                            options={amountTypes}
                            value={amountTypesSelected}
                            onchange={handleFiltersChange}
                        >
                        </lightning-checkbox-group>
                        <lightning-checkbox-group
                            class="
                                slds-border_bottom
                                slds-var-p-vertical_x-small
                                slds-var-p-horizontal_small
                                slds-dropdown_length-5
                            "
                            name="rows"
                            label={labels.rows}
                            options={rows}
                            value={rowsSelected}
                            onchange={handleFiltersChange}
                        >
                        </lightning-checkbox-group>
                        <lightning-checkbox-group
                            class="slds-var-p-vertical_x-small slds-var-p-horizontal_small slds-dropdown_length-5"
                            name="columns"
                            label={labels.columns}
                            options={columns}
                            value={columnsSelected}
                            onchange={handleFiltersChange}
                        >
                        </lightning-checkbox-group>
                    </div>
                </c-pq-popover-button>
                <lightning-button-group class="slds-var-m-left_xx-small pq-print-enabled-button">
                    <lightning-button-icon
                        value={labels.zoomOut}
                        alternative-text={labels.zoomOut}
                        title={labels.zoomOut}
                        icon-name="utility:zoomout"
                        onclick={handleClick}
                    ></lightning-button-icon>
                    <lightning-button-icon
                        value={labels.zoomIn}
                        alternative-text={labels.zoomIn}
                        title={labels.zoomIn}
                        icon-name="utility:zoomin"
                        onclick={handleClick}
                    ></lightning-button-icon>
                </lightning-button-group>
                <lightning-button-menu
                    if:true={showActionMenu}
                    alternative-text={labels.actions}
                    title={labels.actions}
                    icon-name="utility:settings"
                    menu-alignment="right"
                    onselect={handleMenuSelect}
                    class="slds-var-m-left_xx-small"
                >
                    <lightning-menu-item
                        if:true={showEditHeaders}
                        label={labels.editRowsColumns}
                        value="edit"
                        prefix-icon-name="utility:edit"
                    >
                    </lightning-menu-item>
                    <lightning-menu-item
                        if:true={showCreateSummaryFormulas}
                        label={labels.newSummaryFormula}
                        value="formula"
                        prefix-icon-name="utility:formula"
                    >
                    </lightning-menu-item>
                    <lightning-menu-item
                        if:true={showCreateDataType}
                        label={labels.newDataType}
                        value="datatype"
                        prefix-icon-name="utility:data_mapping"
                    >
                    </lightning-menu-item>
                    <lightning-menu-item
                        if:true={showDeleteWs}
                        label={labels.delete}
                        value="delete"
                        prefix-icon-name="utility:delete"
                    >
                    </lightning-menu-item>
                </lightning-button-menu>
                <lightning-button-icon
                    value={screenSizeLabel}
                    alternative-text={screenSizeLabel}
                    title={screenSizeLabel}
                    icon-name={screenSizeIcon}
                    onclick={handleClick}
                    class="slds-var-m-left_xx-small"
                ></lightning-button-icon>
            </div>
        </header>
    </div>
</template>
