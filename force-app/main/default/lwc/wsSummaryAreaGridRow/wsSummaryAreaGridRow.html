<template>
    <lightning-layout if:true={summaryData}>
        <lightning-layout-item size="1"
            ><div class="slds-text-title_bold">{summaryData.name}</div></lightning-layout-item
        >
        <template for:each={summaryData.data} for:item="displayField">
            <lightning-layout-item class="pro-layout-item" size="1" key={displayField.id}>
                <div class="slds-text-align_right">
                    <c-pq-generic-output-field
                        display-type={displayField.type}
                        field-value={displayField.value}
                    ></c-pq-generic-output-field>
                </div>
            </lightning-layout-item>
        </template>
    </lightning-layout>
</template>
