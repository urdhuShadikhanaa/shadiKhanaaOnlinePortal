                    class="slds-text-align_left"
                ></lightning-input>
            </div>
        </template>

            </div>

                <span>Filter {picklistSourceObjectLabel} (Cell Data)</span>
                <lightning-input
                    type="checkbox"
                    label={label.filterDataByAccount}
                    name="cell"
                    checked={areCellsFiltered}
                    onchange={handleCellCheck}
                    class="slds-text-align_left"
                ></lightning-input>

                        type="checkbox"
                        label={label.hideUnfilterableCellData}

                        onchange={handleUnrelatedCellCheck}
                        class="slds-text-align_left"
